<svg xmlns="http://www.w3.org/2000/svg" width="240" height="130" viewBox="0 0 240 130" role="img" aria-labelledby="title desc">
  <title id="title">FluentChess thumbnail</title>
  <desc id="desc">Two-column layout: orange left column with a white chess pawn, cream right column with the FluentChess wordmark.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;800&amp;family=JetBrains+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- Left column: orange block -->
  <rect x="0" y="0" width="56" height="130" fill="#E8690A"/>
  <!-- Pawn centred in left column: x=28 (midpoint), y=65 (midpoint) -->
  <text
    x="28" y="74"
    fill="#FDFAF3"
    font-family="serif"
    font-size="26"
    text-anchor="middle"
    dominant-baseline="auto"
  >♟</text>

  <!-- Right column: cream block -->
  <rect x="56" y="0" width="184" height="130" fill="#FDFAF3"/>

  <!-- Text group: vertically centred as a group -->
  <!-- Group top y ≈ 42, total height ≈ 46px (11+26+5+9+leading), centre ≈ 65 -->
  <text
    x="72" y="55"
    fill="#1a1a1a"
    font-family="'DM Sans', sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="0.12em"
  >FLUENT</text>

  <text
    x="70" y="82"
    fill="#1a1a1a"
    font-family="'DM Sans', sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="-0.02em"
  >Chess</text>

  <text
    x="72" y="98"
    fill="#E8690A"
    font-family="'JetBrains Mono', monospace"
    font-size="9"
    letter-spacing="0.06em"
  >// in development</text>
</svg>
